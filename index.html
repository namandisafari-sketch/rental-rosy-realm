<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Habico</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0f0f11; overflow: hidden; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0f0f11; color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash .logo {
        width: 72px; height: 72px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 20px;
        background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
        font-size: 36px; font-weight: 800; color: #fff;
        margin-bottom: 20px;
      }
      #splash h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
      #splash p { margin-top: 8px; font-size: 14px; color: #94a3b8; }
      #splash .spinner {
        margin-top: 36px; width: 28px; height: 28px;
        border: 3px solid #1e293b; border-top-color: #14b8a6;
        border-radius: 50%; animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      // Polyfill AsyncLocalStorage for browser (TanStack Start needs it)
      if (typeof globalThis.AsyncLocalStorage === 'undefined') {
        (function() {
          function ALS() { this._store = undefined; }
          ALS.prototype.run = function(store, callback) {
            this._store = store;
            try {
              var result = callback();
              if (result && typeof result.then === 'function') {
                var self = this;
                return result.finally(function() { self._store = undefined; });
              }
              this._store = undefined;
              return result;
            } catch(e) {
              this._store = undefined;
              throw e;
            }
          };
          ALS.prototype.getStore = function() { return this._store; };
          globalThis.AsyncLocalStorage = ALS;
        })();
      }
      function hideSplash() { document.getElementById('splash').classList.add('hidden'); }
    </script>
  </head>
  <body>
    <div id="splash">
      <div class="logo">H</div>
      <h1>Habico</h1>
      <p>Elevate the Value of Your Residences</p>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="./src/capacitor-entry.tsx"></script>
  </body>
</html>
