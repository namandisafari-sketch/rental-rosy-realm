<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Habico Portal — Connection Issue</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f8fafc;
  color: #1e293b;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.card {
  text-align: center;
  max-width: 420px;
}
.logo {
  width: 64px;
  height: 64px;
  background: #1e293b;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
}
.logo svg { width: 32px; height: 32px; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
p { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 24px; }
.btn {
  display: inline-block;
  background: #1e293b;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s;
}
.btn:hover { background: #0f172a; }
.details {
  margin-top: 24px;
  font-size: 11px;
  color: #94a3b8;
  word-break: break-all;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none">
      <rect width="32" height="32" rx="6" fill="#fff"/>
      <path d="M8 6h4v9h8V6h4v20h-4v-9h-8v9H8V6z" fill="#1e293b"/>
    </svg>
  </div>
  <h1>Could not connect</h1>
  <p>Habico Portal could not reach the server. Check your internet connection and try again.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
  <div class="details" id="errorDetail"></div>
</div>
</body>
</html>
